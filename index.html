<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>প্রিমিয়াম অ্যাক্সেস - বিজ্ঞাপন দেখুন</title>
    
    <!-- ⭐ AdsGram SDK - সঠিকভাবে লোড করা হয়েছে ⭐ -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f2a, #0a1a3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 380px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.15);
            text-align: center;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(145deg, #1e2a5e, #0f172a);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
        }

        .access-btn {
            background: linear-gradient(95deg, #ff9100, #ff5722);
            border: none;
            width: 100%;
            padding: 16px 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 18px rgba(255, 87, 34, 0.4);
        }

        .access-btn:active {
            transform: scale(0.97);
        }

        .access-btn.disabled {
            background: linear-gradient(95deg, #6c757d, #495057);
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .status-msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #ffe0b3;
        }

        .warning {
            color: #ffb347;
            background: rgba(255, 80, 40, 0.2);
            border-left: 4px solid #ff5722;
        }

        .success-msg {
            color: #9bff9e;
            background: rgba(30, 80, 30, 0.5);
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            color: white;
            font-size: 1.3rem;
        }

        .loader-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        footer {
            font-size: 12px;
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="thumbnail">
        <img src="https://picsum.photos/id/104/400/225" alt="প্রিমিয়াম থাম্বনেইল" style="filter: blur(8px);">
    </div>
    <div class="title">✨ Premium Site Access ✨</div>
    <button id="accessBtn" class="access-btn">
        🔓 এক্সেস নিতে ক্লিক করুন
    </button>
    <div id="statusArea" class="status-msg">
        ⚡ একটি বিজ্ঞাপন দেখে প্রিমিয়াম এক্সেস নিন
    </div>
    <footer> নিরাপদ বিজ্ঞাপন নেটওয়ার্ক</footer>
</div>

<div id="pageLoader" class="loader-overlay">
    <div>🔄 লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</div>
</div>

<script>
    // ==================== কনফিগারেশন ====================
    // ⚠️ এখানে আপনার আসল AdsGram ব্লক আইডি বসান!
    // ব্লক আইডি পেতে: https://partner.adsgram.ai → রেজিস্ট্রেশন করে ব্লক তৈরি করুন
    const ADSGRAM_BLOCK_ID = "int-28401";  // 👈 রিপ্লেস করুন আপনার আসল আইডি দিয়ে
    
    const REDIRECT_URL = "https://www.facebook.com/";
    const COOLDOWN_MINUTES = 10;
    
    const STORAGE_KEY = "premium_access_status";
    const EXPIRY_KEY = "premium_expiry_timestamp";
    
    // ==================== DOM এলিমেন্ট ====================
    const accessBtn = document.getElementById("accessBtn");
    const statusArea = document.getElementById("statusArea");
    const loader = document.getElementById("pageLoader");
    
    // AdsGram কন্ট্রোলার (পরে init করা হবে)
    let adController = null;
    
    // ==================== হেল্পার ফাংশন ====================
    function getCurrentTimestamp() {
        return Date.now();
    }
    
    // ইউজারের বর্তমান এক্সেস স্ট্যাটাস চেক
    function hasActiveAccess() {
        const expiry = localStorage.getItem(EXPIRY_KEY);
        if (!expiry) return false;
        const expiryTime = parseInt(expiry, 10);
        return getCurrentTimestamp() < expiryTime;
    }
    
    // এক্সেস দেওয়া (এড সম্পূর্ণ হলে কল হবে)
    function grantAccess() {
        const expiryTime = getCurrentTimestamp() + (COOLDOWN_MINUTES * 60 * 1000);
        localStorage.setItem(STORAGE_KEY, "granted");
        localStorage.setItem(EXPIRY_KEY, expiryTime.toString());
        updateUI();
    }
    
    // UI আপডেট (বাটন স্টেট ও মেসেজ)
    function updateUI() {
        const active = hasActiveAccess();
        if (active) {
            accessBtn.classList.add("disabled");
            accessBtn.innerHTML = "✅ আপনি এক্সেস নিয়েছেন";
            accessBtn.disabled = true;
            statusArea.innerHTML = "🔒 প্রিমিয়াম এক্সেস সক্রিয় আছে";
            statusArea.className = "status-msg success-msg";
        } else {
            accessBtn.classList.remove("disabled");
            accessBtn.innerHTML = "🔓 এক্সেস নিতে ক্লিক করুন";
            accessBtn.disabled = false;
            
            const oldExpiry = localStorage.getItem(EXPIRY_KEY);
            if (oldExpiry && parseInt(oldExpiry) < getCurrentTimestamp()) {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem(EXPIRY_KEY);
                statusArea.innerHTML = "⏳ আপনার ১০ মিনিট পার হয়েছে! আবার এড দেখে এক্সেস নিন।";
                statusArea.className = "status-msg";
            } else if (!localStorage.getItem(STORAGE_KEY)) {
                statusArea.innerHTML = "🎬 একটি বিজ্ঞাপন সম্পূর্ণ দেখুন, তারপর স্বয়ংক্রিয়ভাবে প্রিমিয়াম সাইটের এক্সেস পান";
                statusArea.className = "status-msg";
            } else {
                statusArea.innerHTML = "🕒 এক্সেস মেয়াদ শেষ, আবার এড দেখুন!";
                statusArea.className = "status-msg warning";
            }
        }
    }
    
    function showWarning(message) {
        statusArea.innerHTML = `⚠️ ${message}`;
        statusArea.className = "status-msg warning";
        setTimeout(() => {
            if (!hasActiveAccess()) {
                updateUI();
            }
        }, 3000);
    }
    
    // ==================== AdsGram বিজ্ঞাপন ফাংশন (সঠিক কনফিগ) ====================
    // রেফারেন্স: https://docs.adsgram.ai/publisher/reward-interstitial-code-examples
    
    function initAdsGram() {
        try {
            // ⭐ সঠিকভাবে AdsGram ইনিশিয়ালাইজ [citation:2][citation:5]
            if (window.Adsgram && typeof window.Adsgram.init === "function") {
                adController = window.Adsgram.init({ 
                    blockId: ADSGRAM_BLOCK_ID,
                    debug: false  // প্রোডাকশনের জন্য false
                });
                console.log("AdsGram initialized successfully");
                return true;
            } else {
                console.error("AdsGram script not loaded properly");
                return false;
            }
        } catch (error) {
            console.error("AdsGram init error:", error);
            return false;
        }
    }
    
    // বিজ্ঞাপন দেখানো এবং সম্পূর্ণ হওয়া পর্যন্ত অপেক্ষা
    async function showRewardedAd() {
        return new Promise((resolve, reject) => {
            // প্রথমবার init না হলে আবার চেষ্টা
            if (!adController) {
                const inited = initAdsGram();
                if (!inited) {
                    reject(new Error("AdsGram লোড হয়নি"));
                    return;
                }
            }
            
            // ⭐ show() মেথড কল - rewarded ফরম্যাটের জন্য .then() মানেই এড সম্পূর্ণ দেখা [citation:2][citation:4]
            adController.show()
                .then((result) => {
                    // ✅ Rewarded ফরম্যাটে .then() আসলে বুঝতে হবে ইউজার এড সম্পূর্ণ দেখেছে [citation:2]
                    console.log("Ad completed fully:", result);
                    resolve(true);
                })
                .catch((error) => {
                    // ❌ ইউজার এড স্কিপ করেছে বা এরর হয়েছে [citation:2]
                    console.warn("Ad not completed:", error);
                    reject(new Error("বিজ্ঞাপন সম্পূর্ণ দেখা হয়নি! দয়া করে সম্পূর্ণ দেখুন।"));
                });
        });
    }
    
    // ==================== মেন ফ্লো ====================
    async function startAccessFlow() {
        // চেক: ইতিমধ্যে এক্সেস আছে?
        if (hasActiveAccess()) {
            showWarning("আপনি ইতিমধ্যে প্রিমিয়াম এক্সেস পেয়েছেন।");
            return;
        }
        
        // মেয়াদ শেষ হয়ে থাকলে ক্লিয়ার করুন
        if (localStorage.getItem(STORAGE_KEY) && !hasActiveAccess()) {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(EXPIRY_KEY);
        }
        
        // লোডার দেখান
        loader.classList.add("active");
        
        try {
            // ⭐ AdsGram বিজ্ঞাপন দেখান এবং সম্পন্ন হওয়ার অপেক্ষা
            const adCompleted = await showRewardedAd();
            
            if (adCompleted) {
                // ✅ এড সম্পূর্ণ: এক্সেস দিন + ফেসবুকে রিডাইরেক্ট
                grantAccess();
                window.location.href = REDIRECT_URL;
            } else {
                // এড সম্পূর্ণ না হলে (থিওরেটিক্যালি এখানে আসার কথা না, কিন্তু নিরাপত্তার জন্য)
                showWarning("প্রিমিয়াম এক্সেস পেতে হলে অবশ্যই এডটি সম্পূর্ণ দেখুন!");
            }
        } catch (error) {
            // এড স্কিপ বা এরর
            console.error(error);
            showWarning(error.message || "প্রিমিয়াম এক্সেস পেতে হলে অবশ্যই এডটি সম্পূর্ণ দেখুন!");
        } finally {
            loader.classList.remove("active");
        }
    }
    
    // ==================== ইভেন্ট লিসেনার ও পেজ লোড ====================
    function init() {
        // প্রথমে AdsGram ইনিশিয়ালাইজ
        const adsgramReady = initAdsGram();
        
        if (!adsgramReady) {
            console.warn("⚠️ AdsGram স্ক্রিপ্ট চেক করুন");
            // সাইট চালু থাকবে, কিন্তু বিজ্ঞাপন দেখানোর সময় যদি কাজ না করে তাহলে এরর হ্যান্ডেল হবে
        }
        
        // UI আপডেট
        updateUI();
        
        // বাটনে ক্লিক ইভেন্ট
        accessBtn.addEventListener("click", startAccessFlow);
    }
    
    // পেজ লোডে শুরু
    init();
</script>
</body>
</html>
